<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShiftShield — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #171717;
      color: #d4cac4;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .logo-text {
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: -0.02em;
    }
    .logo-text span { color: #00aaff; }
    .icon { color: #00aaff; }
    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    p {
      font-family: ui-monospace, monospace;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: rgba(212, 202, 196, 0.5);
      max-width: 280px;
      line-height: 1.6;
    }
    button {
      margin-top: 0.5rem;
      background: #00aaff;
      color: #171717;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 2rem;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
    }
    button:hover { background: rgba(0, 170, 255, 0.85); }
  </style>
</head>
<body>
  <div class="logo">
    <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3L4 7v5c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V7L12 3z"/>
      <line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span class="logo-text">Shift<span>Shield</span></span>
  </div>
  <h1>You're offline</h1>
  <p>Check your connection and try again. Your shift data will load once you're back online.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
